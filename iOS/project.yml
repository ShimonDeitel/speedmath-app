name: SpeedMath
options:
  bundleIdPrefix: com.deitel
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C        # Joshua Deitel — hardcoded, wrong-team gotcha
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
  GoogleUserMessagingPlatform:
    url: https://github.com/googleads/swift-package-manager-google-user-messaging-platform.git
    from: 3.0.0

schemes:
  SpeedMath:
    build:
      targets:
        SpeedMath: all
        SpeedMathTests: [test]
        SpeedMathUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SpeedMath.storekit
    test:
      config: Debug
      targets: [SpeedMathTests, SpeedMathUITests]

targets:
  SpeedMath:
    type: application
    platform: iOS
    sources:
      - path: SpeedMath
      - path: SpeedMath.storekit
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deitel.speedmath
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: SpeedMath/SpeedMath.entitlements
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - package: GoogleUserMessagingPlatform
        product: GoogleUserMessagingPlatform
    info:
      path: SpeedMath/Info.plist
      properties:
        CFBundleDisplayName: SpeedMath
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        NSMicrophoneUsageDescription: "SpeedMath uses the microphone in Speed mode so you can say your answer out loud. Audio is processed on your device and is never uploaded."
        NSSpeechRecognitionUsageDescription: "SpeedMath uses on-device speech recognition to turn your spoken answer into a number in Speed mode."
        NSUserTrackingUsageDescription: "Allowing tracking lets the ads shown in the free version be more relevant to you. SpeedMath itself never collects or sells your data. Pro removes ads entirely."
        GADApplicationIdentifier: "ca-app-pub-5131626660617133~2408905983"
        SKAdNetworkItems:
