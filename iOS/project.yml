  SpeedMathTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpeedMathTests
    dependencies:
      - target: SpeedMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deitel.speedmath.tests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SpeedMath.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SpeedMath"
        BUNDLE_LOADER: "$(TEST_HOST)"

  SpeedMathUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpeedMathUITests
    dependencies:
      - target: SpeedMath
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deitel.speedmath.uitests
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SpeedMath
